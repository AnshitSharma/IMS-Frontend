<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' https://ims.bdcms.bharatdatacenter.com;">
    <title>BDC IMS - Reset Password</title>
    <link rel="stylesheet" href="assets/css/tailwind.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Button Loader */
        .btn-loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            position: absolute;
            right: 16px;
            top: 50%;
            margin-top: -9px;
        }

        .loading .btn-loader {
            display: block;
        }

        .loading .btn-text {
            opacity: 0.8;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Input Group */
        .input-group {
            background: #FFFFFF;
            border: 1px solid #DFE3E6;
            border-radius: 6px;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .input-group:hover {
            border-color: #B9C0C6;
        }

        .input-group:focus-within {
            border-color: #0F766E;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .input-group:focus-within i {
            color: #0F766E;
        }

        .input-group input {
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
        }

        .input-group input:focus,
        .input-group input:active {
            outline: none !important;
            box-shadow: none !important;
        }

        /* Validation Error Styling */
        .field-error {
            width: 100%;
            color: #DC2626;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            flex-basis: 100%;
            order: 3;
            font-weight: 500;
            padding-left: 0.125rem;
        }

        .input-group:has(.field-error) {
            border-color: #DC2626 !important;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.08) !important;
        }
    </style>
</head>

<body class="bg-surface-main text-text-primary min-h-screen">

    <!-- Main Content -->
    <div class="relative z-10 flex min-h-screen items-center justify-center p-6 sm:p-12">
        <div class="w-full max-w-[400px]">

            <!-- Logo -->
            <div class="mb-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded bg-primary flex items-center justify-center">
                        <i class="fas fa-server text-white text-base"></i>
                    </div>
                    <div>
                        <span class="text-base font-semibold text-text-primary tracking-tight block leading-none">BDC IMS</span>
                        <span class="text-[10px] text-text-muted uppercase tracking-[0.18em] block mt-1">Infrastructure Management</span>
                    </div>
                </div>
            </div>

            <!-- Form Card -->
            <div class="bg-surface-card border border-border-light rounded-lg p-8 shadow-card relative">

                <!-- Token Valid: Reset Form -->
                <div id="resetFormContainer">
                    <div class="mb-8">
                        <h2 class="text-2xl font-semibold text-text-primary mb-2 tracking-tight">Reset password</h2>
                        <p class="text-text-muted text-sm">Enter your new password below.</p>
                    </div>

                    <form id="resetPasswordForm" class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="block text-[11px] font-semibold text-text-secondary uppercase tracking-[0.12em]">New Password</label>
                            <div class="input-group flex flex-wrap items-center px-3.5 py-2.5 relative">
                                <i class="fas fa-lock text-text-disabled text-sm min-w-[20px] transition-colors"></i>
                                <input type="password" id="newPassword" name="new_password" placeholder="••••••••"
                                    required maxlength="128" autocomplete="new-password"
                                    class="flex-1 bg-transparent text-sm text-text-primary placeholder-text-disabled ml-3 py-0.5">
                                <button type="button" id="toggleNewPassword"
                                    class="text-text-disabled hover:text-text-secondary transition-colors p-1">
                                    <i class="fas fa-eye text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <label class="block text-[11px] font-semibold text-text-secondary uppercase tracking-[0.12em]">Confirm Password</label>
                            <div class="input-group flex flex-wrap items-center px-3.5 py-2.5 relative">
                                <i class="fas fa-lock text-text-disabled text-sm min-w-[20px] transition-colors"></i>
                                <input type="password" id="confirmNewPassword" name="confirm_password" placeholder="••••••••"
                                    required maxlength="128" autocomplete="new-password"
                                    class="flex-1 bg-transparent text-sm text-text-primary placeholder-text-disabled ml-3 py-0.5">
                                <button type="button" id="toggleConfirmNewPassword"
                                    class="text-text-disabled hover:text-text-secondary transition-colors p-1">
                                    <i class="fas fa-eye text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" id="resetSubmitBtn"
                            class="w-full bg-primary text-white text-sm font-semibold py-3 rounded-md hover:bg-primary-dark transition-colors duration-150 relative mt-2">
                            <span class="btn-text">Reset password</span>
                            <div class="btn-loader"></div>
                        </button>
                    </form>
                </div>

                <!-- Token Invalid: Error State -->
                <div id="tokenErrorContainer" class="hidden text-center py-4">
                    <div class="w-14 h-14 rounded-full bg-danger-light flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-link-slash text-danger text-xl"></i>
                    </div>
                    <h2 class="text-xl font-semibold text-text-primary mb-2 tracking-tight">Invalid reset link</h2>
                    <p class="text-text-muted text-sm mb-6">This password reset link is invalid or has expired. Please request a new one.</p>
                    <a href="index.html"
                        class="inline-flex items-center gap-2 bg-primary text-white text-sm font-semibold py-2.5 px-5 rounded-md hover:bg-primary-dark transition-colors duration-150">
                        <i class="fas fa-arrow-left text-xs"></i>
                        Back to login
                    </a>
                </div>

            </div>

            <!-- Security Badge -->
            <div class="mt-10 pt-6 border-t border-border-light flex items-center justify-center gap-2 text-xs text-text-muted">
                <i class="fas fa-lock text-text-disabled text-[10px]"></i>
                <span class="font-mono">256-bit SSL encrypted connection</span>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="components/global-loading.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/toast.js"></script>
    <script>
        const API_BASE_URL = window.BDC_CONFIG?.API_BASE_URL || 'https://ims.bdcms.bharatdatacenter.com/Ims_backend/api/api.php';

        // --- Utility Functions ---

        function setButtonLoading(buttonId, loading) {
            const button = document.getElementById(buttonId);
            if (!button) return;
            if (loading) {
                button.classList.add('loading');
                button.disabled = true;
            } else {
                button.classList.remove('loading');
                button.disabled = false;
            }
        }

        function setFieldError(input, message) {
            clearFieldError(input);
            const errorElement = document.createElement('div');
            errorElement.className = 'field-error';
            errorElement.textContent = message;
            const inputGroup = input.closest('.input-group');
            if (inputGroup) {
                inputGroup.appendChild(errorElement);
            }
        }

        function clearFieldError(input) {
            if (!input) return;
            const inputGroup = input.closest('.input-group');
            if (!inputGroup) return;
            const errorElement = inputGroup.querySelector('.field-error');
            if (errorElement) errorElement.remove();
        }

        function togglePasswordVisibility(inputId, toggleButton) {
            const input = document.getElementById(inputId);
            const icon = toggleButton.querySelector('i');
            if (!input || !icon) return;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // --- API ---

        async function resetPassword(token, newPassword) {
            const formData = new URLSearchParams();
            formData.append('action', 'auth-reset_password');
            formData.append('token', token);
            formData.append('new_password', newPassword);

            const response = await fetch(API_BASE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        }

        // --- Page Init ---

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token || token.trim() === '') {
                showInvalidTokenState();
                return;
            }

            setupPasswordToggles();
            setupResetForm(token);
        });

        function showInvalidTokenState() {
            document.getElementById('resetFormContainer').classList.add('hidden');
            document.getElementById('tokenErrorContainer').classList.remove('hidden');
        }

        function setupPasswordToggles() {
            document.getElementById('toggleNewPassword')?.addEventListener('click', function () {
                togglePasswordVisibility('newPassword', this);
            });
            document.getElementById('toggleConfirmNewPassword')?.addEventListener('click', function () {
                togglePasswordVisibility('confirmNewPassword', this);
            });
        }

        function setupResetForm(token) {
            const newPasswordInput = document.getElementById('newPassword');
            const confirmInput = document.getElementById('confirmNewPassword');

            // Clear errors on input
            newPasswordInput.addEventListener('input', () => clearFieldError(newPasswordInput));
            confirmInput.addEventListener('input', () => clearFieldError(confirmInput));

            document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmInput.value;

                // Validation
                let valid = true;

                if (!newPassword) {
                    setFieldError(newPasswordInput, 'Password is required');
                    valid = false;
                } else if (newPassword.length < 8) {
                    setFieldError(newPasswordInput, 'Password must be at least 8 characters long');
                    valid = false;
                }

                if (!confirmPassword) {
                    setFieldError(confirmInput, 'Please confirm your password');
                    valid = false;
                } else if (newPassword && newPassword !== confirmPassword) {
                    setFieldError(confirmInput, 'Passwords do not match');
                    valid = false;
                }

                if (!valid) return;

                setButtonLoading('resetSubmitBtn', true);

                try {
                    const response = await resetPassword(token, newPassword);

                    if (response.success) {
                        toast.success(response.message || 'Password reset successfully! Redirecting to login...');
                        // Disable form to prevent re-submission
                        document.getElementById('resetPasswordForm').querySelectorAll('input, button').forEach(el => el.disabled = true);
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        // Handle specific API error cases
                        const msg = response.message || 'Failed to reset password. Please try again.';
                        const isTokenError = msg.toLowerCase().includes('token') ||
                            msg.toLowerCase().includes('expired') ||
                            msg.toLowerCase().includes('invalid') ||
                            msg.toLowerCase().includes('used');

                        if (isTokenError) {
                            // Disable form — token is invalid/expired/used
                            showInvalidTokenState();
                        } else {
                            toast.error(msg);
                            setButtonLoading('resetSubmitBtn', false);
                        }
                    }
                } catch (error) {
                    console.error('Reset password error:', error);
                    toast.error('Network error. Please check your connection and try again.');
                    setButtonLoading('resetSubmitBtn', false);
                }
            });
        }
    </script>
</body>

</html>
