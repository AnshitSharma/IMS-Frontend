<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' https://ims.bdcms.bharatdatacenter.com;">
    <title>BDC IMS - Reset Password</title>
    <link rel="stylesheet" href="assets/css/tailwind.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOK5JFg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Button Loader */
        .btn-loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            position: absolute;
            right: 20px;
            top: 50%;
            margin-top: -10px;
        }

        .loading .btn-loader {
            display: block;
        }

        .loading .btn-text {
            opacity: 0.8;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Input Group Focus */
        .input-group:focus-within {
            border-color: #0D9488;
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
        }

        .input-group:focus-within i {
            color: #0D9488;
        }

        /* Validation Error Styling */
        .field-error {
            width: 100%;
            color: #DC2626;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            flex-basis: 100%;
            order: 3;
            font-weight: 500;
            padding-left: 0.25rem;
        }

        .input-group input {
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
        }

        .input-group:has(.field-error) {
            border-color: #DC2626 !important;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1) !important;
        }

        .input-group input:focus,
        .input-group input:active {
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-600 h-screen overflow-hidden selection:bg-teal-500/20 selection:text-teal-400">

    <!-- Background Elements -->
    <div class="fixed inset-0 z-0">
        <img src="assets/images/login-bg.png" alt="Background" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/40"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 flex h-full items-center justify-center p-6 sm:p-12">
        <div class="w-full max-w-md space-y-8">

            <!-- Logo -->
            <div class="text-center">
                <div class="inline-flex w-12 h-12 rounded-xl bg-teal-500 items-center justify-center mb-4 shadow-lg shadow-teal-500/20">
                    <i class="fas fa-server text-white text-xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">BDC IMS</h2>
            </div>

            <!-- Form Card -->
            <div class="bg-slate-900/60 backdrop-blur-xl p-8 sm:p-10 rounded-[2.5rem] shadow-2xl shadow-black/80 relative border border-white/20">

                <!-- Token Valid: Reset Form -->
                <div id="resetFormContainer">
                    <div class="mb-8">
                        <h2 class="text-2xl font-bold text-white mb-2">Reset Password</h2>
                        <p class="text-white text-sm font-medium">Enter your new password below.</p>
                    </div>

                    <form id="resetPasswordForm" class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="text-xs font-bold text-white uppercase tracking-wider ml-1">New Password</label>
                            <div class="input-group flex flex-wrap items-center bg-slate-800/40 border border-slate-700/50 rounded-2xl px-4 py-3.5 transition-all relative hover:border-teal-500/50 focus-within:border-teal-500">
                                <i class="fas fa-lock text-slate-400 text-lg min-w-[24px]"></i>
                                <input type="password" id="newPassword" name="new_password" placeholder="••••••••"
                                    required maxlength="128"
                                    class="flex-1 bg-transparent border-none outline-none focus:ring-0 text-white placeholder-slate-500 ml-4 h-full">
                                <button type="button" id="toggleNewPassword"
                                    class="text-slate-400 hover:text-teal-400 transition-colors p-1">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <label class="text-xs font-bold text-white uppercase tracking-wider ml-1">Confirm Password</label>
                            <div class="input-group flex flex-wrap items-center bg-slate-800/40 border border-slate-700/50 rounded-2xl px-4 py-3.5 transition-all relative hover:border-teal-500/50 focus-within:border-teal-500">
                                <i class="fas fa-lock text-slate-400 text-lg min-w-[24px]"></i>
                                <input type="password" id="confirmNewPassword" name="confirm_password" placeholder="••••••••"
                                    required maxlength="128"
                                    class="flex-1 bg-transparent border-none outline-none focus:ring-0 text-white placeholder-slate-500 ml-4 h-full">
                                <button type="button" id="toggleConfirmNewPassword"
                                    class="text-slate-400 hover:text-teal-400 transition-colors p-1">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" id="resetSubmitBtn"
                            class="w-full bg-primary text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 relative overflow-hidden mt-4">
                            <span class="btn-text">Reset Password</span>
                            <div class="btn-loader"></div>
                        </button>
                    </form>
                </div>

                <!-- Token Invalid: Error State -->
                <div id="tokenErrorContainer" class="hidden text-center py-4">
                    <div class="w-16 h-16 rounded-full bg-red-500/20 flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-link-slash text-red-400 text-2xl"></i>
                    </div>
                    <h2 class="text-xl font-bold text-white mb-2">Invalid Reset Link</h2>
                    <p class="text-slate-400 text-sm mb-6">This password reset link is invalid or has expired. Please request a new one.</p>
                    <a href="index.html"
                        class="inline-flex items-center gap-2 bg-gradient-to-r from-teal-500 to-cyan-500 text-white font-semibold py-3 px-6 rounded-xl transition-all hover:-translate-y-0.5">
                        <i class="fas fa-arrow-left text-sm"></i>
                        Back to Login
                    </a>
                </div>

            </div>

            <!-- Security Badge -->
            <div class="text-center">
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white border border-slate-200 text-xs text-slate-500 shadow-sm">
                    <i class="fas fa-lock text-teal-600"></i>
                    <span>256-bit SSL Encrypted Connection</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="components/global-loading.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/toast.js"></script>
    <script>
        const API_BASE_URL = window.BDC_CONFIG?.API_BASE_URL || 'https://ims.bdcms.bharatdatacenter.com/Ims_backend/api/api.php';

        // --- Utility Functions ---

        function setButtonLoading(buttonId, loading) {
            const button = document.getElementById(buttonId);
            if (!button) return;
            if (loading) {
                button.classList.add('loading');
                button.disabled = true;
            } else {
                button.classList.remove('loading');
                button.disabled = false;
            }
        }

        function setFieldError(input, message) {
            clearFieldError(input);
            const errorElement = document.createElement('div');
            errorElement.className = 'field-error';
            errorElement.textContent = message;
            const inputGroup = input.closest('.input-group');
            if (inputGroup) {
                inputGroup.appendChild(errorElement);
            }
        }

        function clearFieldError(input) {
            if (!input) return;
            const inputGroup = input.closest('.input-group');
            if (!inputGroup) return;
            const errorElement = inputGroup.querySelector('.field-error');
            if (errorElement) errorElement.remove();
        }

        function togglePasswordVisibility(inputId, toggleButton) {
            const input = document.getElementById(inputId);
            const icon = toggleButton.querySelector('i');
            if (!input || !icon) return;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // --- API ---

        async function resetPassword(token, newPassword) {
            const formData = new URLSearchParams();
            formData.append('action', 'auth-reset_password');
            formData.append('token', token);
            formData.append('new_password', newPassword);

            const response = await fetch(API_BASE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        }

        // --- Page Init ---

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token || token.trim() === '') {
                showInvalidTokenState();
                return;
            }

            setupPasswordToggles();
            setupResetForm(token);
        });

        function showInvalidTokenState() {
            document.getElementById('resetFormContainer').classList.add('hidden');
            document.getElementById('tokenErrorContainer').classList.remove('hidden');
        }

        function setupPasswordToggles() {
            document.getElementById('toggleNewPassword')?.addEventListener('click', function () {
                togglePasswordVisibility('newPassword', this);
            });
            document.getElementById('toggleConfirmNewPassword')?.addEventListener('click', function () {
                togglePasswordVisibility('confirmNewPassword', this);
            });
        }

        function setupResetForm(token) {
            const newPasswordInput = document.getElementById('newPassword');
            const confirmInput = document.getElementById('confirmNewPassword');

            // Clear errors on input
            newPasswordInput.addEventListener('input', () => clearFieldError(newPasswordInput));
            confirmInput.addEventListener('input', () => clearFieldError(confirmInput));

            document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmInput.value;

                // Validation
                let valid = true;

                if (!newPassword) {
                    setFieldError(newPasswordInput, 'Password is required');
                    valid = false;
                } else if (newPassword.length < 8) {
                    setFieldError(newPasswordInput, 'Password must be at least 8 characters long');
                    valid = false;
                }

                if (!confirmPassword) {
                    setFieldError(confirmInput, 'Please confirm your password');
                    valid = false;
                } else if (newPassword && newPassword !== confirmPassword) {
                    setFieldError(confirmInput, 'Passwords do not match');
                    valid = false;
                }

                if (!valid) return;

                setButtonLoading('resetSubmitBtn', true);

                try {
                    const response = await resetPassword(token, newPassword);

                    if (response.success) {
                        toast.success(response.message || 'Password reset successfully! Redirecting to login...');
                        // Disable form to prevent re-submission
                        document.getElementById('resetPasswordForm').querySelectorAll('input, button').forEach(el => el.disabled = true);
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        // Handle specific API error cases
                        const msg = response.message || 'Failed to reset password. Please try again.';
                        const isTokenError = msg.toLowerCase().includes('token') ||
                            msg.toLowerCase().includes('expired') ||
                            msg.toLowerCase().includes('invalid') ||
                            msg.toLowerCase().includes('used');

                        if (isTokenError) {
                            // Disable form — token is invalid/expired/used
                            showInvalidTokenState();
                        } else {
                            toast.error(msg);
                            setButtonLoading('resetSubmitBtn', false);
                        }
                    }
                } catch (error) {
                    console.error('Reset password error:', error);
                    toast.error('Network error. Please check your connection and try again.');
                    setButtonLoading('resetSubmitBtn', false);
                }
            });
        }
    </script>
</body>

</html>
