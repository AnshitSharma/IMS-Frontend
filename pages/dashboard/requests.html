<!DOCTYPE html>
<html lang="en">

<head>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        /* The signature element: a vertical "spine" connecting a request's steps,
           with a status node per step and the active step elevated. Uses the
           app's CSS variables so it tracks the theme. */
        .pl-stepper { position: relative; }
        .pl-step { position: relative; padding-left: 46px; padding-bottom: 18px; }
        .pl-step:last-child { padding-bottom: 0; }
        .pl-step::before {
            content: ""; position: absolute; left: 16px; top: 36px; bottom: -2px; width: 2px;
            background: var(--color-border, #e5e7eb);
        }
        .pl-step.is-done::before { background: #16a34a; }
        .pl-step:last-child::before { display: none; }
        .pl-node {
            position: absolute; left: 0; top: 2px; width: 34px; height: 34px; border-radius: 9999px;
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
            border: 2px solid var(--color-border, #e5e7eb);
            background: var(--color-surface-card, #fff); color: var(--color-text-muted, #94a3b8);
        }
        .pl-step.is-done .pl-node { background: #16a34a; border-color: #16a34a; color: #fff; }
        .pl-step.is-rejected .pl-node, .pl-step.is-skipped .pl-node { background: #dc2626; border-color: #dc2626; color: #fff; }
        .pl-step.is-skipped .pl-node { background: var(--color-text-muted, #94a3b8); border-color: var(--color-text-muted, #94a3b8); }
        .pl-step.is-active .pl-node {
            background: var(--color-primary, #0d9488); border-color: var(--color-primary, #0d9488); color: #fff;
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-primary, #0d9488) 22%, transparent);
        }
        @media (prefers-reduced-motion: no-preference) {
            .pl-step.is-active .pl-node { animation: pl-pulse 2.2s ease-in-out infinite; }
            @keyframes pl-pulse {
                0%, 100% { box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary, #0d9488) 26%, transparent); }
                50% { box-shadow: 0 0 0 7px color-mix(in srgb, var(--color-primary, #0d9488) 6%, transparent); }
            }
        }
        .scope-tab.active { background: var(--color-primary, #0d9488); color: #fff; border-color: var(--color-primary, #0d9488); }
    </style>
</head>

<body class="bg-surface-main">

            </div>
            <div class="nav-menu flex items-center gap-4">

                    <div class="user-info text-right hidden md:block">
                        <span id="userDisplayName" class="block text-sm font-medium text-text-primary">Loading...</span>

                    <div class="user-avatar w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="dropdown relative">
                        <button class="dropdown-btn text-text-secondary hover:text-text-primary">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="dropdown-content absolute right-0 mt-2 w-48 bg-surface-card rounded-lg shadow-lg border border-border hidden z-dropdown">
                            <a href="#" id="changePassword" class="block px-4 py-2 text-sm text-text-primary hover:bg-surface-hover flex items-center gap-2">

    <div class="layout-wrapper">
        <div class="main-container flex">
            <div id="sidebar-placeholder"></div>

            <main class="main-content flex-1 p-4 sm:p-6">
                <div id="pipelinesView" class="content-section active">
                    <div class="content-header mb-5">
                        <div class="flex flex-wrap items-start justify-between gap-3">
                            <div>
                                <h2 class="text-2xl font-bold text-text-primary">Requests</h2>
                                <p class="text-sm text-text-muted mt-1">Track requests as they move from step to step and team to team.</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <a id="typesLink" href="request-types.html" class="px-4 py-2 border border-border rounded-lg hover:bg-surface-hover transition-colors text-text-primary min-h-[44px] hidden items-center gap-2">
                                    <i class="fas fa-sliders"></i> <span class="hidden sm:inline">Request Types</span>
                                </a>
                                <button id="refreshPipelinesBtn" class="px-4 py-2 border border-border rounded-lg hover:bg-surface-hover transition-colors text-text-primary min-h-[44px] min-w-[44px]" title="Refresh">
                                    <i class="fas fa-sync-alt"></i>
                                </button>
                                <button id="createPipelineBtn" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-600 transition-colors flex items-center gap-2 min-h-[44px]">
                                    <i class="fas fa-plus"></i> New Request
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Scope tabs -->
                    <div class="flex flex-wrap items-center gap-2 mb-4" id="scopeTabs">
                        <button class="scope-tab active px-4 py-2 text-sm font-medium rounded-lg border border-border text-text-secondary transition-colors" data-scope="my_queue">
                            <i class="fas fa-inbox mr-1.5"></i>My Queue
                        </button>
                        <button class="scope-tab px-4 py-2 text-sm font-medium rounded-lg border border-border text-text-secondary hover:bg-surface-hover transition-colors" data-scope="created">
                            <i class="fas fa-user-pen mr-1.5"></i>Created by me
                        </button>
                        <button class="scope-tab px-4 py-2 text-sm font-medium rounded-lg border border-border text-text-secondary hover:bg-surface-hover transition-colors hidden" data-scope="all" id="scopeAllTab">
                            <i class="fas fa-layer-group mr-1.5"></i>All
                        </button>
                    </div>

                    <!-- Filters -->
                    <div class="flex flex-col sm:flex-row sm:flex-wrap gap-3 mb-5">
                        <input type="text" id="pipelineSearch" placeholder="Search requests..."
                            class="px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary min-h-[44px] w-full sm:w-auto sm:flex-1 bg-surface-card text-text-primary">
                        <select id="pipelineStatusFilter" class="px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary min-h-[44px] bg-surface-card text-text-primary">
                            <option value="">All Status</option>
                            <option value="in_progress">In Progress</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                            <option value="rejected">Rejected</option>
                        </select>
                        <select id="pipelinePriorityFilter" class="px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary min-h-[44px] bg-surface-card text-text-primary">
                            <option value="">All Priority</option>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                        <select id="pipelineTypeFilter" class="px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary min-h-[44px] bg-surface-card text-text-primary">
                            <option value="">All Types</option>
                        </select>
                    </div>

                    <div id="pipelinesLoadingState" class="text-center py-12 hidden">
                        <i class="fas fa-spinner fa-spin text-4xl text-primary mb-4"></i>
                        <p class="text-text-muted">Loading requests...</p>
                    </div>
                    <div id="pipelinesErrorState" class="text-center py-12 bg-surface-card rounded-lg hidden">
                        <i class="fas fa-exclamation-triangle text-4xl text-danger mb-4"></i>
                        <p class="text-text-primary font-semibold mb-2">Couldn't load requests</p>
                        <p id="pipelinesErrorMessage" class="text-text-muted mb-4"></p>
                        <button onclick="requestsManager.load()" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-600">Try Again</button>
                    </div>
                    <div id="pipelinesEmptyState" class="text-center py-16 bg-surface-card rounded-lg border border-dashed border-border hidden">
                        <i class="fas fa-inbox text-4xl text-text-muted mb-4"></i>
                        <p class="text-text-primary font-semibold mb-2">Nothing here yet</p>
                        <p class="text-text-muted mb-4" id="pipelinesEmptyHint">No requests match this view.</p>
                        <button id="createFirstPipelineBtn" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-600">
                            <i class="fas fa-plus mr-2"></i>New Request
                        </button>
                    </div>

                    <div id="pipelinesList" class="space-y-3"></div>

                    <div id="pipelinesPagination" class="flex flex-col sm:flex-row justify-between items-center gap-3 mt-5 hidden">
                        <div id="pipelinesPaginationInfo" class="text-sm text-text-muted"></div>
                        <div class="flex gap-2">
                            <button id="pipelinesPrev" class="px-3 py-1.5 min-h-[40px] border border-border rounded hover:bg-surface-hover text-text-primary">Previous</button>
                            <button id="pipelinesNext" class="px-3 py-1.5 min-h-[40px] border border-border rounded hover:bg-surface-hover text-text-primary">Next</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Create request modal -->
    <div id="modalContainer" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center hidden" style="z-index: 2000;">

            </div>

    <!-- Request detail modal -->

            <div class="modal-body overflow-y-auto px-6 py-4 max-h-[calc(92vh-120px)]" id="detailBody"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof initRequests === 'function') initRequests();
        });
    </script>
    <script>
        (function () {
            function updateThemeIcon(theme) {
                const icon = document.getElementById('themeToggleIcon');
                if (!icon) return;
                icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
            function initTheme() {
                if (typeof utils !== 'undefined' && utils.theme) {
                    utils.theme.init();
                    updateThemeIcon(utils.theme.get());
                }
            }
            function handleThemeToggle() {
                if (typeof utils === 'undefined' || !utils.theme) return;
                const newTheme = utils.theme.toggle();
                updateThemeIcon(newTheme);
                if (typeof toast !== 'undefined') {
                    toast.success(newTheme === 'dark' ? 'Dark mode enabled' : 'Light mode enabled', 2000);
                }
            }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initTheme);
            else initTheme();
            const btn = document.getElementById('themeToggleBtn');
            if (btn) btn.addEventListener('click', handleThemeToggle);
        })();
    </script>
</body>
