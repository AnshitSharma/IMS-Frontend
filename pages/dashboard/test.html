<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' https://ims.bdcms.bharatdatacenter.com;">
    <title>Server Motherboard Explorer - BDC IMS</title>

    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <link rel="stylesheet" href="../../assets/css/tailwind.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <style>
        /* ========== 3D Scene Setup ========== */
        :root {
            --scene-accent: #57d2c6;
            --scene-accent-soft: rgba(87, 210, 198, 0.16);
            --scene-border: rgba(126, 171, 191, 0.16);
            --scene-text-bright: rgba(219, 232, 242, 0.82);
            --scene-text-soft: rgba(165, 183, 200, 0.6);
        }

        .mb-scene {
            width: 100%;
            min-height: calc(100vh - 180px);
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2200px;
            perspective-origin: 50% 32%;
            isolation: isolate;
            background:
                radial-gradient(circle at 50% 20%, rgba(28, 58, 76, 0.78) 0%, rgba(28, 58, 76, 0) 32%),
                radial-gradient(circle at 18% 22%, rgba(40, 122, 148, 0.16) 0%, rgba(40, 122, 148, 0) 26%),
                radial-gradient(circle at 82% 72%, rgba(39, 171, 151, 0.14) 0%, rgba(39, 171, 151, 0) 28%),
                linear-gradient(180deg, #111a25 0%, #09101b 52%, #05080f 100%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            padding: 40px 20px;
        }

        .mb-scene::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                linear-gradient(120deg, rgba(255, 255, 255, 0.045), transparent 28%, transparent 72%, rgba(11, 21, 34, 0.34)),
                repeating-linear-gradient(90deg, rgba(130, 151, 171, 0.035) 0 1px, transparent 1px 76px),
                repeating-linear-gradient(0deg, rgba(130, 151, 171, 0.03) 0 1px, transparent 1px 64px);
            mix-blend-mode: screen;
            opacity: 0.5;
        }

        .mb-scene::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 56px;
            width: min(82%, 860px);
            height: 170px;
            transform: translateX(-50%);
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.62) 0%, rgba(0, 0, 0, 0.24) 42%, rgba(0, 0, 0, 0) 78%);
            filter: blur(16px);
            opacity: 0.92;
        }

        .mb-scene-rotator {
            width: 880px;
            max-width: 95vw;
            aspect-ratio: 1000 / 700;
            position: relative;
            z-index: 1;
            transform-style: preserve-3d;
            transform-origin: 50% 48%;
            transform: rotateX(50deg) rotateY(-8deg) rotateZ(-27deg);
            transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), filter 0.28s ease;
            will-change: transform;
            filter: drop-shadow(0 30px 55px rgba(0, 0, 0, 0.36));
        }

        .mb-scene-rotator::before {
            content: '';
            position: absolute;
            inset: 46px 68px 68px;
            border-radius: 18px;
            pointer-events: none;
            transform: translateZ(14px);
            background:
                radial-gradient(circle at 22% 20%, rgba(113, 238, 222, 0.18) 0%, rgba(113, 238, 222, 0) 34%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 32%, rgba(10, 18, 28, 0.2) 68%);
            filter: blur(28px);
            opacity: 0.45;
        }

        .mb-scene-rotator::after {
            content: '';
            position: absolute;
            inset: 38px 46px 80px 42px;
            border-radius: 10px;
            pointer-events: none;
            transform: translateZ(30px);
            border: 1px solid rgba(96, 182, 195, 0.12);
            box-shadow: 0 0 32px rgba(76, 178, 188, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            opacity: 0.78;
        }

        /* ========== Layers ========== */
        .mb-layer {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
        }
        .mb-layer svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
        }

        .layer-chassis {
            transform: translateZ(-24px);
        }
        .layer-board {
            transform: translateZ(36px);
        }
        .layer-components {
            transform: translateZ(84px);
        }

        /* Chassis dim effect */
        .layer-chassis svg {
            opacity: 0.82;
            filter: drop-shadow(0 16px 26px rgba(0, 0, 0, 0.2));
        }
        .layer-board svg {
            filter: drop-shadow(0 22px 34px rgba(2, 12, 18, 0.24)) drop-shadow(0 0 26px rgba(42, 140, 160, 0.1));
        }
        .layer-components svg {
            filter: drop-shadow(0 18px 30px rgba(0, 0, 0, 0.24));
        }

        /* ========== Component Interaction ========== */
        .mb-component {
            cursor: pointer;
            transition: filter 0.22s ease, transform 0.22s ease, opacity 0.22s ease;
            transform-box: fill-box;
            transform-origin: center;
        }
        .mb-component:hover {
            filter: drop-shadow(0 0 18px rgba(87, 210, 198, 0.42)) drop-shadow(0 12px 16px rgba(0, 0, 0, 0.28));
            transform: translateY(-4px) scale(1.012);
        }
        .mb-component .comp-highlight {
            opacity: 0;
            transition: opacity 0.22s ease, filter 0.22s ease, transform 0.22s ease;
            filter: blur(1px) drop-shadow(0 0 12px rgba(87, 210, 198, 0.26));
        }
        .mb-component:hover .comp-highlight {
            opacity: 0.22;
            transform: scale(1.015);
        }

        /* ========== Labels & Leader Lines ========== */
        .component-label {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 7.5px;
            fill: var(--scene-text-bright);
            pointer-events: none;
            letter-spacing: 0.4px;
            font-weight: 600;
        }
        .component-label-sub {
            font-size: 5.5px;
            fill: var(--scene-text-soft);
            font-weight: 400;
        }
        .leader-line {
            stroke: rgba(186, 205, 224, 0.32);
            stroke-width: 0.6;
            fill: none;
        }
        .leader-dot {
            fill: rgba(186, 205, 224, 0.42);
        }
        .leader-text {
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 9px;
            fill: rgba(219, 232, 242, 0.78);
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .leader-text-sub {
            font-size: 6.5px;
            fill: rgba(165, 183, 200, 0.56);
            font-weight: 400;
        }
        .labels-hidden .component-label,
        .labels-hidden .component-label-sub,
        .labels-hidden .leader-line,
        .labels-hidden .leader-dot,
        .labels-hidden .leader-text,
        .labels-hidden .leader-text-sub,
        .labels-hidden .label-group {
            display: none;
        }

        /* ========== Trace Animations ========== */
        @keyframes traceFlowBlue {
            0% { stroke-dashoffset: 30; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes traceFlowGreen {
            0% { stroke-dashoffset: 28; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes traceFlowOrange {
            0% { stroke-dashoffset: 32; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes glowPulse {
            0%, 100% { opacity: 0.16; }
            50% { opacity: 0.4; }
        }

        .trace-group {
            mix-blend-mode: screen;
        }
        .trace-memory {
            fill: none;
            stroke: #59a8ff;
            stroke-width: 2.1;
            stroke-dasharray: 8 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 7px rgba(89, 168, 255, 0.32));
            animation: traceFlowBlue 1.8s linear infinite;
        }
        .trace-memory-glow {
            fill: none;
            stroke: #3b82f6;
            stroke-width: 11;
            stroke-linecap: round;
            filter: blur(8px);
            animation: glowPulse 2.5s ease-in-out infinite;
        }
        .trace-pcie {
            fill: none;
            stroke: #34d080;
            stroke-width: 2.1;
            stroke-dasharray: 8 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 7px rgba(52, 208, 128, 0.28));
            animation: traceFlowGreen 2.2s linear infinite;
        }
        .trace-pcie-glow {
            fill: none;
            stroke: #22c55e;
            stroke-width: 11;
            stroke-linecap: round;
            filter: blur(8px);
            animation: glowPulse 3s ease-in-out infinite;
        }
        .trace-storage {
            fill: none;
            stroke: #ffb740;
            stroke-width: 2.1;
            stroke-dasharray: 8 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 7px rgba(255, 183, 64, 0.28));
            animation: traceFlowOrange 2.8s linear infinite;
        }
        .trace-storage-glow {
            fill: none;
            stroke: #f59e0b;
            stroke-width: 11;
            stroke-linecap: round;
            filter: blur(8px);
            animation: glowPulse 3.5s ease-in-out infinite;
        }
        .traces-hidden .trace-group {
            display: none;
        }
        .memory-hidden .trace-memory-group { display: none; }
        .pcie-hidden .trace-pcie-group { display: none; }
        .storage-hidden .trace-storage-group { display: none; }

        /* ========== Tooltip ========== */
        .mv-tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            background: rgba(10, 15, 25, 0.94);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(13, 148, 136, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            min-width: 200px;
            max-width: 300px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(13,148,136,0.08);
            opacity: 0;
            transform: translateY(10px) scale(0.96);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .mv-tooltip.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .mv-tooltip-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .mv-tooltip-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #0d9488;
            box-shadow: 0 0 8px #0d9488;
            flex-shrink: 0;
        }
        .mv-tooltip-name {
            font-size: 14px;
            font-weight: 700;
            color: #f1f5f9;
        }
        .mv-tooltip-role {
            font-size: 11px;
            color: #94a3b8;
            line-height: 1.5;
            margin-top: 4px;
        }

        /* ========== Detail Panel ========== */
        .mv-detail-panel {
            position: fixed;
            top: 70px;
            right: 0;
            width: 360px;
            height: calc(100vh - 70px);
            z-index: 1500;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
            background: rgba(15, 20, 30, 0.97);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.08);
        }
        .mv-detail-panel.open {
            transform: translateX(0);
        }
        .mv-detail-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .mv-detail-name {
            font-size: 18px;
            font-weight: 700;
            color: #f1f5f9;
        }
        .mv-detail-type {
            font-size: 11px;
            color: #0d9488;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-top: 4px;
        }
        .mv-detail-close {
            position: absolute;
            top: 20px;
            right: 16px;
            color: #64748b;
            cursor: pointer;
            padding: 6px;
            border: none;
            background: none;
            font-size: 16px;
            transition: color 0.2s;
        }
        .mv-detail-close:hover {
            color: #f1f5f9;
        }
        .mv-detail-body {
            padding: 20px;
        }
        .mv-detail-desc {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 20px;
        }
        .mv-detail-section-title {
            font-size: 10px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }
        .mv-spec-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 13px;
        }
        .mv-spec-label { color: #64748b; }
        .mv-spec-value { color: #e2e8f0; font-weight: 600; }
        .mv-conn-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 12px;
            color: #94a3b8;
        }
        .mv-conn-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #0d9488;
            flex-shrink: 0;
        }

        /* ========== Controls Panel ========== */
        .mv-controls {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(7, 12, 20, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid var(--scene-border);
            border-radius: 12px;
            padding: 16px 18px;
            z-index: 100;
            min-width: 185px;
            box-shadow: 0 16px 38px rgba(0, 0, 0, 0.22);
        }
        .mv-controls-title {
            font-size: 12px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }
        .mv-control-group {
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .mv-control-group:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .mv-control-subtitle {
            font-size: 9px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        .mv-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 0;
            user-select: none;
        }
        .mv-toggle input { display: none; }
        .mv-toggle-slider {
            width: 34px;
            height: 18px;
            background: #1e2838;
            border-radius: 9px;
            position: relative;
            transition: background 0.25s;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .mv-toggle-slider::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4a5568;
            transition: transform 0.25s, background 0.25s;
        }
        .mv-toggle input:checked + .mv-toggle-slider {
            background: rgba(13,148,136,0.3);
            border-color: rgba(13,148,136,0.4);
        }
        .mv-toggle input:checked + .mv-toggle-slider::after {
            transform: translateX(16px);
            background: #0d9488;
        }
        .mv-toggle input:checked + .mv-toggle-slider.blue {
            background: rgba(59,130,246,0.25);
            border-color: rgba(59,130,246,0.35);
        }
        .mv-toggle input:checked + .mv-toggle-slider.blue::after {
            background: #3b82f6;
        }
        .mv-toggle input:checked + .mv-toggle-slider.green {
            background: rgba(34,197,94,0.25);
            border-color: rgba(34,197,94,0.35);
        }
        .mv-toggle input:checked + .mv-toggle-slider.green::after {
            background: #22c55e;
        }
        .mv-toggle input:checked + .mv-toggle-slider.orange {
            background: rgba(245,158,11,0.25);
            border-color: rgba(245,158,11,0.35);
        }
        .mv-toggle input:checked + .mv-toggle-slider.orange::after {
            background: #f59e0b;
        }
        .mv-toggle-label {
            font-size: 12px;
            color: #94a3b8;
            white-space: nowrap;
        }

        /* ========== Title Bar ========== */
        .mv-title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .mv-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--color-text-primary, #f1f5f9);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .mv-title i {
            color: #0d9488;
        }
        .mv-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--color-border, #334155);
            background: var(--color-surface-card, #1e293b);
            color: var(--color-text-secondary, #94a3b8);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .mv-btn:hover {
            border-color: #0d9488;
            color: #0d9488;
        }

        /* ========== PCB visual details ========== */
        .pcb-texture { opacity: 0.12; }
        .chassis-detail { opacity: 0.56; }

        @media (max-width: 1024px) {
            .mb-scene {
                min-height: calc(100vh - 150px);
                padding: 108px 16px 28px;
            }

            .mb-scene-rotator {
                max-width: 100%;
            }

            .mv-controls {
                top: 12px;
                left: 12px;
                padding: 14px 16px;
            }
        }

        @media (max-width: 768px) {
            .mb-scene {
                padding: 150px 10px 18px;
                border-radius: 16px;
            }

            .mv-controls {
                left: 50%;
                transform: translateX(-50%);
                width: min(92vw, 340px);
            }

            .mv-title {
                font-size: 15px;
            }
        }
    </style>
</head>

                <!-- Title Bar -->
                <div class="mv-title-bar">
                    <span class="mv-title">

                    </span>
                    <button class="mv-btn" id="btnToggleLabels">
                        <i class="fas fa-tag"></i> Toggle Labels
                    </button>
                </div>

                <!-- 3D Scene -->
                <div class="mb-scene" id="mb-scene">
                    <!-- Controls Panel (overlay) -->
                    <div class="mv-controls">
                        <div class="mv-controls-title">Controls</div>
                        <div class="mv-control-group">
                            <label class="mv-toggle">
                                <input type="checkbox" checked id="ctrlLabels">
                                <span class="mv-toggle-slider"></span>
                                <span class="mv-toggle-label">Label View</span>
                            </label>
                            <label class="mv-toggle">

                                <span class="mv-toggle-slider"></span>
                                <span class="mv-toggle-label">Data Flow Animation</span>

                        </div>
                        <div class="mv-control-group">
                            <div class="mv-control-subtitle">Connection Layers</div>
                            <label class="mv-toggle">
                                <input type="checkbox" checked id="ctrlMemory">
                                <span class="mv-toggle-slider blue"></span>
                                <span class="mv-toggle-label">CPU / Memory</span>
                            </label>
                            <label class="mv-toggle">
                                <input type="checkbox" checked id="ctrlPCIe">
                                <span class="mv-toggle-slider green"></span>
                                <span class="mv-toggle-label">PCIe / Expansion</span>
                            </label>
                            <label class="mv-toggle">
                                <input type="checkbox" checked id="ctrlStorage">
                                <span class="mv-toggle-slider orange"></span>
                                <span class="mv-toggle-label">Storage</span>
                            </label>

    <script>
        (function () {
            function initTheme() {
                if (typeof utils !== 'undefined' && utils.theme) {
                    utils.theme.init();
                    updateThemeIcon(utils.theme.get());
                }
            }
            function updateThemeIcon(theme) {
                const icon = document.getElementById('themeToggleIcon');
                if (!icon) return;
                icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
            function handleThemeToggle() {
                if (typeof utils === 'undefined' || !utils.theme) return;
                const toggleBtn = document.getElementById('themeToggleBtn');
                if (toggleBtn) {
                    toggleBtn.classList.add('toggling');
                    setTimeout(() => toggleBtn.classList.remove('toggling'), 300);
                }
                const newTheme = utils.theme.toggle();
                updateThemeIcon(newTheme);
                if (typeof toast !== 'undefined') {
                    toast.success(newTheme === 'dark' ? 'Dark mode enabled' : 'Light mode enabled', 2000);
                }
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initTheme);
            } else {
                initTheme();
            }
            const themeToggleBtn = document.getElementById('themeToggleBtn');
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', handleThemeToggle);
            }
        })();
    </script>

    <!-- Motherboard Visualizer -->
    <script>
        class MotherboardVisualizer {
            constructor() {
                this.scene = document.getElementById('mb-scene');
                this.rotator = document.getElementById('mb-scene-rotator');
                this.boardSvg = document.getElementById('board-svg');
                this.compSvg = document.getElementById('components-svg');
                this.tooltip = document.getElementById('mv-tooltip');
                this.detailPanel = document.getElementById('mv-detail-panel');

                this.baseRotateX = 50;
                this.baseRotateY = -8;
                this.baseRotateZ = -27;
                this.tiltRangeX = 7;
                this.tiltRangeY = 4.2;
                this.tiltRangeZ = 4.5;
                this.rafId = null;

                this.labelsVisible = true;
                this.tracesVisible = true;

                this.componentData = this.buildComponentData();
                this.init();
            }

            init() {
                this.syncSceneProfile();
                this.bindComponentEvents();
                this.bindControlEvents();
                this.bindParallax();
                window.addEventListener('resize', () => this.syncSceneProfile());
            }

            getTransform(rotateX = this.baseRotateX, rotateY = this.baseRotateY, rotateZ = this.baseRotateZ) {
                return `rotateX(${rotateX}deg) rotateY(${rotateY}deg) rotateZ(${rotateZ}deg)`;
            }

            syncSceneProfile() {
                if (window.innerWidth < 768) {
                    this.baseRotateX = 44;
                    this.baseRotateY = -4;
                    this.baseRotateZ = -17;
                    this.tiltRangeX = 4.5;
                    this.tiltRangeY = 2.6;
                    this.tiltRangeZ = 2.8;
                } else if (window.innerWidth < 1180) {
                    this.baseRotateX = 47;
                    this.baseRotateY = -6;
                    this.baseRotateZ = -22;
                    this.tiltRangeX = 5.4;
                    this.tiltRangeY = 3.2;
                    this.tiltRangeZ = 3.3;
                } else {
                    this.baseRotateX = 50;
                    this.baseRotateY = -8;
                    this.baseRotateZ = -27;
                    this.tiltRangeX = 7;
                    this.tiltRangeY = 4.2;
                    this.tiltRangeZ = 4.5;
                }

                this.rotator.style.transform = this.getTransform();
            }

            bindComponentEvents() {
                const comps = this.compSvg.querySelectorAll('.mb-component');
                comps.forEach(comp => {
                    comp.addEventListener('mouseenter', e => this.onHover(e));
                    comp.addEventListener('mouseleave', e => this.onLeave(e));
                    comp.addEventListener('mousemove', e => this.moveTooltip(e));
                    comp.addEventListener('click', e => this.onClick(e));
                });
            }

            bindControlEvents() {
                document.getElementById('ctrlLabels').addEventListener('change', e => {
                    this.labelsVisible = e.target.checked;
                    this.compSvg.classList.toggle('labels-hidden', !this.labelsVisible);
                });
                document.getElementById('ctrlTraces').addEventListener('change', e => {
                    this.tracesVisible = e.target.checked;
                    this.boardSvg.classList.toggle('traces-hidden', !this.tracesVisible);
                });
                document.getElementById('ctrlMemory').addEventListener('change', e => {
                    this.boardSvg.classList.toggle('memory-hidden', !e.target.checked);
                });
                document.getElementById('ctrlPCIe').addEventListener('change', e => {
                    this.boardSvg.classList.toggle('pcie-hidden', !e.target.checked);
                });
                document.getElementById('ctrlStorage').addEventListener('change', e => {
                    this.boardSvg.classList.toggle('storage-hidden', !e.target.checked);
                });

                document.getElementById('btnToggleLabels').addEventListener('click', () => {
                    const cb = document.getElementById('ctrlLabels');
                    cb.checked = !cb.checked;
                    cb.dispatchEvent(new Event('change'));
                });

                document.getElementById('detail-close').addEventListener('click', () => this.closeDetail());
                document.addEventListener('keydown', e => { if (e.key === 'Escape') this.closeDetail(); });
            }

            bindParallax() {
                this.scene.addEventListener('mousemove', e => {
                    if (this.rafId) return;
                    this.rafId = requestAnimationFrame(() => {
                        const rect = this.scene.getBoundingClientRect();
                        const x = (e.clientX - rect.left) / rect.width - 0.5;
                        const y = (e.clientY - rect.top) / rect.height - 0.5;
                        const rX = this.baseRotateX + y * this.tiltRangeX;
                        const rY = this.baseRotateY + x * this.tiltRangeY;
                        const rZ = this.baseRotateZ + x * this.tiltRangeZ;
                        this.rotator.style.transform = this.getTransform(rX, rY, rZ);
                        this.rafId = null;
                    });
                });
                this.scene.addEventListener('mouseleave', () => {
                    this.rotator.style.transform = this.getTransform();
                });
            }

            onHover(e) {
                const id = e.currentTarget.dataset.componentId;
                const data = this.componentData[id];
                if (!data) return;
                document.getElementById('tip-name').textContent = data.name;
                document.getElementById('tip-role').textContent = data.role;
                this.tooltip.classList.add('visible');
                this.moveTooltip(e);
            }

            onLeave() {
                this.tooltip.classList.remove('visible');
            }

            moveTooltip(e) {
                let x = e.clientX + 18;
                let y = e.clientY + 18;
                const tr = this.tooltip.getBoundingClientRect();
                if (x + tr.width > window.innerWidth - 16) x = e.clientX - tr.width - 18;
                if (y + tr.height > window.innerHeight - 16) y = e.clientY - tr.height - 18;
                this.tooltip.style.left = x + 'px';
                this.tooltip.style.top = y + 'px';
            }

            onClick(e) {
                const id = e.currentTarget.dataset.componentId;
                const data = this.componentData[id];
                if (!data) return;

                document.getElementById('detail-name').textContent = data.name;
                document.getElementById('detail-type').textContent = data.type;
                document.getElementById('detail-desc').textContent = data.description;

                const specsEl = document.getElementById('detail-specs');
                specsEl.innerHTML = '';
                if (data.specs) {
                    Object.entries(data.specs).forEach(([k, v]) => {
