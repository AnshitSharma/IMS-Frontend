<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' https://ims.bdcms.bharatdatacenter.com;">
    <title>Activity Log - BDC Inventory</title>
    <!-- Prevent flash of unstyled content: must run before CSS loads -->
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="../../assets/css/tailwind.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
</head>

<body class="bg-surface-main">
    <!-- Navigation Header -->
    <nav class="navbar bg-surface-card shadow-sm sticky top-0 z-navbar">
        <div class="nav-container max-w-screen-4xl mx-auto navbar-padding py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button
                    class="hamburger-menu lg:hidden bg-surface-secondary hover:bg-surface-hover text-text-secondary hover:text-primary rounded-lg p-2 transition-colors border border-border-light"
                    id="hamburgerBtn" aria-label="Toggle Menu">
                    <i class="fas fa-bars text-base"></i>
                </button>
                <a href="./index.html" class="nav-brand flex items-center gap-2 text-primary font-semibold text-lg hover:opacity-80 transition-opacity">
                    <i class="fas fa-server"></i>
                    <span>BDC Inventory</span>
                </a>
            </div>

            <div class="nav-menu flex items-center gap-4">
                <div class="nav-user flex items-center gap-3">
                    <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle theme" title="Toggle dark mode">
                        <i class="fas fa-moon" id="themeToggleIcon"></i>
                    </button>
                    <div class="user-info text-right hidden md:block">
                        <span id="userDisplayName" class="block text-sm font-medium text-text-primary">Loading...</span>
                        <span id="userRole" class="block text-xs text-text-muted">User</span>
                    </div>
                    <div class="user-avatar w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="dropdown relative">
                        <button class="dropdown-btn text-text-secondary hover:text-text-primary">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="dropdown-content absolute right-0 mt-2 w-48 bg-surface-card rounded-lg shadow-lg border border-border hidden z-dropdown">
                            <a href="#" id="changePassword" class="block px-4 py-2 text-sm text-text-primary hover:bg-surface-hover flex items-center gap-2">
                                <i class="fas fa-key"></i> Change Password
                            </a>
                            <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-text-primary hover:bg-surface-hover flex items-center gap-2">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="layout-wrapper">
        <div class="main-container flex">
            <div id="sidebar-placeholder"></div>

            <main class="main-content flex-1 p-6">
                <div id="activityLogView" class="content-section active">
                    <!-- Header -->
                    <div class="content-header mb-6">
                        <div class="flex items-center justify-between mb-4">
                            <div>
                                <h2 class="text-2xl font-bold text-text-primary mb-2">
                                    <i class="fas fa-history"></i> Activity Log
                                </h2>
                                <p class="text-sm text-text-muted">All inventory and system changes (admin only)</p>
                            </div>
                            <button
                                class="btn-secondary px-4 py-2 bg-surface-hover text-text-secondary rounded-lg hover:bg-border transition-colors flex items-center gap-2"
                                id="refreshLogsBtn">
                                <i class="fas fa-sync-alt"></i> Refresh
                            </button>
                        </div>
                    </div>

                    <!-- Access Denied message (hidden by default) -->
                    <div id="accessDeniedMsg" class="hidden text-center py-16">
                        <i class="fas fa-lock text-5xl text-text-muted mb-4"></i>
                        <h3 class="text-xl font-semibold text-text-primary mb-2">Access Restricted</h3>
                        <p class="text-text-secondary">Activity logs are only available to administrators.</p>
                    </div>

                    <!-- Log Table -->
                    <div id="logTableContainer" class="table-container bg-surface-card rounded-lg shadow-sm overflow-hidden">
                        <table class="w-full table-base table-responsive" id="activityLogTable">
                            <thead class="bg-surface-hover border-b border-border">
                                <tr>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-text-secondary">Time</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-text-secondary">User</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-text-secondary">Component Type</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-text-secondary">Component ID</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-text-secondary">Action</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-text-secondary">Notes</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-text-secondary">IP Address</th>
                                </tr>
                            </thead>
                            <tbody id="activityLogTableBody" class="divide-y divide-border">
                                <tr>
                                    <td colspan="7" class="px-4 py-8 text-center text-text-muted">
                                        <i class="fas fa-spinner fa-spin mr-2"></i> Loading logs...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div class="flex items-center justify-between mt-4" id="logPagination">
                        <span id="logPaginationInfo" class="text-sm text-text-muted"></span>
                        <div class="flex gap-2">
                            <button id="logPrevBtn"
                                class="px-4 py-2 text-sm bg-surface-hover text-text-secondary rounded-lg hover:bg-border transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                                disabled>
                                <i class="fas fa-chevron-left mr-1"></i> Previous
                            </button>
                            <button id="logNextBtn"
                                class="px-4 py-2 text-sm bg-surface-hover text-text-secondary rounded-lg hover:bg-border transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                                disabled>
                                Next <i class="fas fa-chevron-right ml-1"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../components/global-loading.js"></script>
    <script src="../../assets/js/toast.js"></script>
    <script src="../../assets/js/dashboard/utils.js"></script>
    <script src="../../assets/js/dashboard/api.js"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../components/sidebar-manager.js"></script>
    <script>
        // Activity Log Page
        (function () {
            const LIMIT = 50;
            let currentOffset = 0;
            let totalLogs = 0;

            function formatDate(dateStr) {
                if (!dateStr) return '-';
                try {
                    return new Date(dateStr).toLocaleString();
                } catch { return dateStr; }
            }

            function getActionBadge(action) {
                if (!action) return '-';
                const lower = action.toLowerCase();
                let cls = 'bg-surface-hover text-text-secondary';
                if (lower.includes('created') || lower.includes('login')) cls = 'bg-green-100 text-green-700';
                else if (lower.includes('deleted') || lower.includes('removed')) cls = 'bg-red-100 text-red-600';
                else if (lower.includes('updated') || lower.includes('edited') || lower.includes('assigned')) cls = 'bg-blue-100 text-blue-700';
                return `<span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${cls}">${utils.escapeHtml(action)}</span>`;
            }

            function renderRows(logs) {
                const tbody = document.getElementById('activityLogTableBody');
                if (!logs || logs.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-8 text-center text-text-muted">No activity logs found.</td></tr>`;
                    return;
                }
                tbody.innerHTML = logs.map(log => `
                    <tr class="hover:bg-surface-hover transition-colors">
                        <td class="px-4 py-3 text-sm text-text-secondary whitespace-nowrap">${formatDate(log.created_at)}</td>
                        <td class="px-4 py-3 text-sm text-text-primary font-medium">${utils.escapeHtml(log.username || `#${log.user_id}`)}</td>
                        <td class="px-4 py-3 text-sm text-text-secondary uppercase">${utils.escapeHtml(log.component_type || '-')}</td>
                        <td class="px-4 py-3 text-sm text-text-muted">${log.component_id || '-'}</td>
                        <td class="px-4 py-3">${getActionBadge(log.action)}</td>
                        <td class="px-4 py-3 text-sm text-text-secondary max-w-xs truncate" title="${utils.escapeHtml(log.notes || '')}">${utils.escapeHtml(log.notes || '-')}</td>
                        <td class="px-4 py-3 text-sm text-text-muted">${utils.escapeHtml(log.ip_address || '-')}</td>
                    </tr>
                `).join('');
            }

            function updatePagination() {
                const info = document.getElementById('logPaginationInfo');
                const prevBtn = document.getElementById('logPrevBtn');
                const nextBtn = document.getElementById('logNextBtn');
                const start = totalLogs === 0 ? 0 : currentOffset + 1;
                const end = Math.min(currentOffset + LIMIT, totalLogs);
                info.textContent = `Showing ${start}–${end} of ${totalLogs}`;
                prevBtn.disabled = currentOffset === 0;
                nextBtn.disabled = (currentOffset + LIMIT) >= totalLogs;
            }

            async function loadLogs() {
                const tbody = document.getElementById('activityLogTableBody');
                tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-8 text-center text-text-muted"><i class="fas fa-spinner fa-spin mr-2"></i> Loading...</td></tr>`;
                try {
                    const result = await api.dashboard.getLogs({ limit: LIMIT, offset: currentOffset });
                    if (!result.success) {
                        if (result.code === 403) {
                            document.getElementById('logTableContainer').classList.add('hidden');
                            document.getElementById('logPagination').classList.add('hidden');
                            document.getElementById('accessDeniedMsg').classList.remove('hidden');
                            return;
                        }
                        throw new Error(result.message);
                    }
                    totalLogs = result.data.pagination.total;
                    renderRows(result.data.logs);
                    updatePagination();
                } catch (err) {
                    tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-8 text-center text-red-500"><i class="fas fa-exclamation-circle mr-2"></i>${utils.escapeHtml(err.message || 'Failed to load logs')}</td></tr>`;
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                loadLogs();

                document.getElementById('refreshLogsBtn').addEventListener('click', () => {
                    currentOffset = 0;
                    loadLogs();
                });

                document.getElementById('logPrevBtn').addEventListener('click', () => {
                    if (currentOffset > 0) {
                        currentOffset = Math.max(0, currentOffset - LIMIT);
                        loadLogs();
                    }
                });

                document.getElementById('logNextBtn').addEventListener('click', () => {
                    if ((currentOffset + LIMIT) < totalLogs) {
                        currentOffset += LIMIT;
                        loadLogs();
                    }
                });
            });
        })();
    </script>
    <script src="../../assets/js/dashboard/dashboard.js"></script>
    <script>
        // Theme + nav init (same pattern as other pages)
        (() => {
            function initTheme() {
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
                const icon = document.getElementById('themeToggleIcon');
                if (icon) icon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }

            function handleThemeToggle() {
                const newTheme = utils.theme.toggle();
                const icon = document.getElementById('themeToggleIcon');
                if (icon) icon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
                if (typeof toast !== 'undefined') {
                    toast.success(newTheme === 'dark' ? 'Dark mode enabled' : 'Light mode enabled', 2000);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initTheme);
            } else {
                initTheme();
            }

            const themeToggleBtn = document.getElementById('themeToggleBtn');
            if (themeToggleBtn) themeToggleBtn.addEventListener('click', handleThemeToggle);
        })();
    </script>
</body>

</html>
